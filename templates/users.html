{% extends "base.html" %}
{% block title %}User Management{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold text-[#0d1b4b] mb-6">User Management</h1>

<div class="bg-white rounded-xl border border-gray-100 p-6 shadow-sm mb-6">
    <h2 class="text-lg font-semibold text-[#0d1b4b] mb-4">Add User</h2>
    <form method="POST" class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
            <input type="text" name="username" required
                   class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#0d1b4b]">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" name="password" required
                   class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#0d1b4b]">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Role</label>
            <select name="role" required
                    class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#0d1b4b]">
                {% for role in roles %}
                <option value="{{ role }}">{{ role }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="md:col-span-3">
            <button type="submit"
                    class="px-5 py-2 bg-[#0d1b4b] text-white rounded-lg hover:bg-[#162a6e] transition-colors">
                Add User
            </button>
        </div>
    </form>
</div>

<div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
    <table class="w-full text-sm">
        <thead class="bg-[#0d1b4b] text-white">
            <tr>
                <th class="px-4 py-3 text-left">ID</th>
                <th class="px-4 py-3 text-left">Username</th>
                <th class="px-4 py-3 text-left">Role</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-gray-100">
            {% for user in users %}
            <tr class="hover:bg-gray-50">
                <td class="px-4 py-3">{{ user.user_id }}</td>
                <td class="px-4 py-3">{{ user.username }}</td>
                <td class="px-4 py-3">{{ user.role }}</td>
            </tr>
            {% else %}
            <tr>
                <td colspan="3" class="px-4 py-6 text-center text-gray-400">No users found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
