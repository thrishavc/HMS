{% extends "base.html" %}
{% block title %}Departments{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold text-[#0d1b4b] mb-6">Department Management</h1>

<div class="bg-white rounded-xl border border-gray-100 p-6 shadow-sm mb-6">
    <h2 class="text-lg font-semibold text-[#0d1b4b] mb-4">Add Department</h2>
    <form method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Department Name</label>
            <input type="text" name="name" required
                   class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#0d1b4b]">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Location</label>
            <input type="text" name="location" required
                   class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#0d1b4b]">
        </div>
        <div class="md:col-span-2">
            <button type="submit"
                    class="px-5 py-2 bg-[#0d1b4b] text-white rounded-lg hover:bg-[#162a6e] transition-colors">
                Add Department
            </button>
        </div>
    </form>
</div>

<div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
    <table class="w-full text-sm">
        <thead class="bg-[#0d1b4b] text-white">
            <tr>
                <th class="px-4 py-3 text-left">ID</th>
                <th class="px-4 py-3 text-left">Name</th>
                <th class="px-4 py-3 text-left">Location</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-gray-100">
            {% for dept in departments %}
            <tr class="hover:bg-gray-50">
                <td class="px-4 py-3">{{ dept.dept_id }}</td>
                <td class="px-4 py-3">{{ dept.name }}</td>
                <td class="px-4 py-3">{{ dept.location }}</td>
            </tr>
            {% else %}
            <tr>
                <td colspan="3" class="px-4 py-6 text-center text-gray-400">No departments found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
